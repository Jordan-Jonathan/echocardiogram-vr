<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Metaverse USG Training - Controller & Hand Support</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  
  <style>
    /* Preview kamera tetap ada untuk mode Non-VR */
    #camera-preview {
      position: fixed; bottom: 20px; right: 20px;
      width: 200px; height: 150px; z-index: 9999;
      border: 2px solid #00ff88; border-radius: 10px; transform: scaleX(-1);
    }
    #status-ai {
      position: fixed; bottom: 180px; right: 20px;
      background: rgba(0,0,0,0.7); color: #00ff88; padding: 5px; z-index: 9999;
    }
  </style>
</head>
<body>

  <video id="input-video" style="display:none"></video>
  <video id="camera-preview" autoplay playsinline></video>
  <div id="status-ai">Mencari Tangan/Kontroler...</div>

  <a-scene background="color: #1a1a2e" webxr="requiredFeatures: local-floor">
    
    <!-- RIG: Sekarang menggunakan movement-controls untuk Thumbstick Meta -->
    <a-entity id="rig" 
              movement-controls="controls: checkpoint, gamepad, trackpad, keyboard; speed: 0.1" 
              position="0 0 1.5">
              
      <!-- Kamera: ditambahkan penyesuaian posisi agar tidak "tenggelam" di lantai -->
      <a-entity camera 
                position="0 1.6 0" 
                look-controls="pointerLockEnabled: true">
        <a-cursor id="mouseCursor" raycaster="objects: .clickable" color="#00ff88"></a-cursor>
      </a-entity>

      <!-- KONTROLER TANGAN KANAN (Laser & Probe) -->
      <a-entity id="rightHand" 
                oculus-touch-controls="hand: right"
                laser-controls="hand: right" 
                raycaster="objects: .clickable; far: 5" 
                line="color: #00ff88">
        
        <a-entity id="vr-probe" rotation="-90 0 0" visible="false">
          <a-cylinder radius="0.03" height="0.15" color="#333333"></a-cylinder>
          <a-sphere position="0 -0.08 0" radius="0.032" color="#666666"></a-sphere>
        </a-entity>
      </a-entity>
      
      <!-- KONTROLER TANGAN KIRI (Navigasi) -->
      <a-entity id="leftHand" 
                oculus-touch-controls="hand: left"
                movement-controls="controls: gamepad">
      </a-entity>
    </a-entity>

    <!-- UI PANEL 3D (Agar bisa diklik di Metaverse) -->
    <a-entity id="ui-3d-panel" position="-1 1.5 -0.5" rotation="0 30 0">
      <a-plane width="0.8" height="1.2" color="#000" opacity="0.8"></a-plane>
      <a-text value="USG VIEWS" position="0 0.5 0.01" align="center" color="#00ff88" width="2"></a-text>
      
      <!-- Tombol-tombol View -->
      <a-plane class="clickable" onclick="selectView('apical4')" position="0 0.3 0.02" width="0.6" height="0.15" color="#1a1a2e">
        <a-text value="Apical 4C" align="center" width="1.5"></a-text>
      </a-plane>
      <a-plane class="clickable" onclick="selectView('parasternal')" position="0 0.1 0.02" width="0.6" height="0.15" color="#1a1a2e">
        <a-text value="Parasternal" align="center" width="1.5"></a-text>
      </a-plane>
      <a-plane class="clickable" onclick="selectView('subcostal')" position="0 -0.1 0.02" width="0.6" height="0.15" color="#1a1a2e">
        <a-text value="Subcostal" align="center" width="1.5"></a-text>
      </a-plane>
    </a-entity>

    <!-- INSTRUKSI MELAYANG -->
    <a-entity id="instruction-board" position="0 2 -1">
        <a-plane width="1" height="0.3" color="#0064c8" opacity="0.9"></a-plane>
        <a-text id="instruction-text" value="Position at apex, marker toward left shoulder" align="center" width="1.8"></a-text>
    </a-entity>

    <!-- PROBE UNTUK DESKTOP (MediaPipe) -->
    <a-entity id="desktop-probe">
      <a-cylinder radius="0.03" height="0.15" color="#333333" rotation="90 0 0"></a-cylinder>
      <a-sphere position="0 0 -0.08" radius="0.032" color="#666666"></a-sphere>
    </a-entity>

    <!-- LINGKUNGAN -->
    <a-entity id="patient" position="0 0.5 -1" rotation="-90 0 0">
      <a-box width="0.6" height="0.9" depth="0.25" color="#e8beac"></a-box>
      <a-sphere position="0 0.6 0.05" radius="0.15" color="#e8beac"></a-sphere>
    </a-entity>

    <a-entity id="heart-display" position="-0.8 1.2 -1.2" scale="0.4 0.4 0.4">
       <a-sphere id="heart-model" radius="0.4" color="#cc3333"></a-sphere>
       <a-text id="usg-label" value="ECHO - Apical 4C" position="0 0.8 0" align="center" color="#00ff88"></a-text>
    </a-entity>

    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
    <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#2a2a4a"></a-plane>
  </a-scene>

  <script>
    const videoElement = document.getElementById('input-video');
    const desktopProbe = document.getElementById('desktop-probe');
    const vrProbe = document.getElementById('vr-probe');
    const sceneEl = document.querySelector('a-scene');

    let isVR = false;

    // --- LOGIKA VR MODE ---
    sceneEl.addEventListener('enter-vr', () => {
      isVR = true;
      vrProbe.setAttribute('visible', true);
      desktopProbe.setAttribute('visible', false);
      document.getElementById('camera-preview').style.display = 'none';
      document.getElementById('status-ai').innerText = "VR Mode: Gunakan Kontroler Kanan";
    });

    sceneEl.addEventListener('exit-vr', () => {
      isVR = false;
      vrProbe.setAttribute('visible', false);
      desktopProbe.setAttribute('visible', true);
      document.getElementById('camera-preview').style.display = 'block';
    });

    // --- LOGIKA MEDIAPIPE (Untuk Desktop/Non-VR) ---
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    hands.onResults((results) => {
      if (!isVR && results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hand = results.multiHandLandmarks[0];
        const x = (0.5 - hand[9].x) * 3; 
        const y = (0.5 - hand[9].y) * 2 + 1.2;
        const z = (hand[9].z * 3) - 0.5;
        desktopProbe.setAttribute('position', {x, y, z});
      }
    });

    const camera = new Camera(videoElement, {
      onFrame: async () => { if (!isVR) await hands.send({image: videoElement}); },
      width: 640, height: 480
    });
    
    navigator.mediaDevices.getUserMedia({video: true}).then(stream => {
      videoElement.srcObject = stream;
      document.getElementById('camera-preview').srcObject = stream;
      camera.start();
    });

    // --- FUNGSI INTERAKSI ---
    const viewData = {
      apical4: { label: 'ECHO - Apical 4C', instr: 'Apex position, point to left shoulder' },
      parasternal: { label: 'ECHO - PLAX', instr: '3rd intercostal space, right side' },
      subcostal: { label: 'ECHO - Subcostal', instr: 'Under xiphoid, probe flat' }
    };

    function selectView(id) {
      const config = viewData[id];
      document.getElementById('usg-label').setAttribute('value', config.label);
      document.getElementById('instruction-text').setAttribute('value', config.instr);
      
      // Berikan haptic feedback (getaran) jika di VR
      const rightHand = document.getElementById('rightHand');
      if (rightHand.components['tracked-controls']) {
        const gamepad = rightHand.components['tracked-controls'].controller;
        if (gamepad && gamepad.hapticActuators && gamepad.hapticActuators[0]) {
          gamepad.hapticActuators[0].pulse(0.5, 100);
        }
      }
    }
  </script>
</body>
</html>
