<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>USG Metaverse - Dual Controller System</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
</head>
<body>

  <a-scene background="color: #1a1a2e" webxr="requiredFeatures: local-floor">
    
    <!-- RIG: PUSAT KONTROL PERGERAKAN -->
    <!-- movement-controls menghubungkan Joystick ke pergerakan kamera -->
    <a-entity id="rig" 
              movement-controls="controls: gamepad; speed: 0.15" 
              position="0 0 1.5">
      
      <!-- HEAD: Untuk melihat sekeliling dengan gerakan kepala -->
      <a-entity camera 
                position="0 1.6 0" 
                look-controls="pointerLockEnabled: true">
      </a-entity>

      <!-- TANGAN KIRI: KHUSUS NAVIGASI (Jalan) -->
      <a-entity oculus-touch-controls="hand: left"></a-entity>

      <!-- TANGAN KANAN: KHUSUS KLIK & GRAB (Probe USG) -->
      <a-entity id="rightHand" 
                oculus-touch-controls="hand: right"
                laser-controls="hand: right"
                raycaster="objects: .clickable; far: 5"
                line="color: #00ff88; opacity: 0.7">
        
        <!-- PROBE USG: Menempel di tangan kanan -->
        <a-entity id="probe-model" rotation="-90 0 0">
          <a-cylinder radius="0.03" height="0.15" color="#333333"></a-cylinder>
          <a-sphere position="0 -0.08 0" radius="0.032" color="#666666"></a-sphere>
          <!-- Indikator sinar untuk mempermudah klik -->
          <a-entity line="start: 0 0 0; end: 0 -2 0; color: #00ff88"></a-entity>
        </a-entity>
      </a-entity>

    </a-entity>

    <!-- UI PANEL 3D (World Space UI agar bisa diklik di VR) -->
    <a-entity position="-1.2 1.5 -0.8" rotation="0 25 0">
      <a-plane width="0.8" height="1" color="#1a1a2e" opacity="0.9" class="clickable">
        <a-text value="USG SELECTOR" position="0 0.4 0.01" align="center" width="2" color="#00ff88"></a-text>
        
        <!-- Tombol Interaktif -->
        <a-plane class="clickable" onclick="selectView('Apical 4C')" position="0 0.15 0.02" width="0.6" height="0.15" color="#2c3e50">
          <a-text value="Apical 4-Chamber" align="center" width="1.5"></a-text>
        </a-plane>

        <a-plane class="clickable" onclick="selectView('Parasternal')" position="0 -0.1 0.02" width="0.6" height="0.15" color="#2c3e50">
          <a-text value="Parasternal Axis" align="center" width="1.5"></a-text>
        </a-plane>
      </a-plane>
    </a-entity>

    <!-- OBJEK PASIEN -->
    <a-entity id="patient-group" position="0 0.5 -1">
      <!-- Torso Pasien -->
      <a-box id="patient-body" width="0.6" height="0.9" depth="0.25" color="#e8beac" class="clickable"></a-box>
      <!-- Target Zone (Visual Guide) -->
      <a-box width="0.65" height="0.95" depth="0.26" color="#00ff88" opacity="0.1" material="transparent: true"></a-box>
    </a-entity>

    <!-- MONITOR USG -->
    <a-entity position="1 1.5 -0.8" rotation="0 -30 0">
        <a-box width="0.6" height="0.4" depth="0.05" color="#222"></a-box>
        <a-plane position="0 0 0.03" width="0.55" height="0.35" color="#000">
            <a-text id="monitor-text" value="READY" align="center" color="#00ff00" width="1"></a-text>
        </a-plane>
    </a-entity>

    <!-- LIGHTING & FLOOR -->
    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" position="1 2 1"></a-light>
    <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#111"></a-plane>

  </a-scene>

  <script>
    // Fungsi untuk interaksi klik dari laser kontroler kanan
    function selectView(viewName) {
      console.log("View Selected:", viewName);
      const monitor = document.getElementById('monitor-text');
      monitor.setAttribute('value', viewName);

      // Fitur Haptic Feedback (Getar) pada tangan kanan saat klik
      const rightHand = document.getElementById('rightHand');
      const gamepad = rightHand.components['oculus-touch-controls'] ? 
                      rightHand.components['oculus-touch-controls'].controller : null;
      
      if (gamepad && gamepad.hapticActuators && gamepad.hapticActuators[0]) {
        gamepad.hapticActuators[0].pulse(0.6, 100);
      }
    }

    // Event listener untuk mendeteksi saat masuk VR
    document.querySelector('a-scene').addEventListener('enter-vr', () => {
      console.log("Meta Quest Connected!");
    });
  </script>
</body>
</html>
