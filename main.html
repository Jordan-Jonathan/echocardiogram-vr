<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR USG Training App</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <style>
    #ui-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      color: white;
      font-family: Arial, sans-serif;
    }
    #ui-panel h3 {
      margin-top: 0;
      color: #00ff88;
    }
    #ui-panel button {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #1a1a2e;
      color: white;
      border: 2px solid #00ff88;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    #ui-panel button:hover {
      background: #00ff88;
      color: #1a1a2e;
    }
    #ui-panel button.active {
      background: #00ff88;
      color: #1a1a2e;
    }
    #current-view {
      margin-top: 15px;
      padding: 10px;
      background: #16213e;
      border-radius: 5px;
      text-align: center;
    }
    #probe-instruction {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      background: rgba(0, 100, 200, 0.9);
      padding: 15px 20px;
      border-radius: 10px;
      color: white;
      font-family: Arial, sans-serif;
      max-width: 250px;
    }
  </style>
</head>
<body>
  <!-- 2D UI Panel for View Selection -->
  <div id="ui-panel">
    <h3>🫀 USG View Selection</h3>
    <button onclick="selectView('apical4')" id="btn-apical4">Apical 4-Chamber</button>
    <button onclick="selectView('apical2')" id="btn-apical2">Apical 2-Chamber</button>
    <button onclick="selectView('parasternal')" id="btn-parasternal">Parasternal Long Axis</button>
    <button onclick="selectView('subcostal')" id="btn-subcostal">Subcostal</button>
    <button onclick="selectView('leftVentricle')" id="btn-leftVentricle">Left Ventricle Focus</button>
    <button onclick="selectView('rightVentricle')" id="btn-rightVentricle">Right Ventricle Focus</button>
    <div id="current-view">
      <strong>Current:</strong> <span id="view-name">Apical 4-Chamber</span>
    </div>
  </div>

  <!-- Probe Orientation Instructions -->
  <div id="probe-instruction">
    <strong>PROBE ORIENTATION:</strong>
    <p id="instruction-text">Rotate 0° - Point marker toward patient's left shoulder</p>
  </div>

  <a-scene background="color: #1a1a2e">
    <!-- First-person camera rig -->
    <a-entity id="rig" position="0 1.6 0">
      <a-camera look-controls wasd-controls>
        <a-cursor color="#00ff88" fuse="false"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- Lighting -->
    <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
    <a-light type="point" position="0 2 0" intensity="0.5" color="#00aaff"></a-light>

    <!-- Patient (lying down) -->
    <a-entity id="patient" position="0 0.5 -1" rotation="-90 0 0">
      <!-- Patient Body/Torso -->
      <a-box id="torso" 
             position="0 0 0" 
             width="0.6" 
             height="0.8" 
             depth="0.25"
             color="#e8beac"
             opacity="0.9"></a-box>
      
      <!-- Head -->
      <a-sphere position="0 0.55 0.05" 
                radius="0.15" 
                color="#e8beac"></a-sphere>
      
      <!-- Arms -->
      <a-box position="0.45 0.1 0" 
             width="0.15" 
             height="0.5" 
             depth="0.12"
             color="#e8beac"></a-box>
      <a-box position="-0.45 0.1 0" 
             width="0.15" 
             height="0.5" 
             depth="0.12"
             color="#e8beac"></a-box>
      
      <!-- Legs -->
      <a-box position="0.12 -0.7 0" 
             width="0.18" 
             height="0.6" 
             depth="0.15"
             color="#3a5a7c"></a-box>
      <a-box position="-0.12 -0.7 0" 
             width="0.18" 
             height="0.6" 
             depth="0.15"
             color="#3a5a7c"></a-box>
    </a-entity>

    <!-- Green Target Zone (covers entire torso) -->
    <a-entity id="target-zone" position="0 0.63 -1">
      <!-- Main torso highlight volume -->
      <a-box id="torso-zone"
             width="0.7"
             height="0.9"
             depth="0.18"
             color="#00ff88"
             opacity="0.2"
             material="transparent: true">
        <a-animation attribute="opacity"
                     from="0.15"
                     to="0.35"
                     dur="1000"
                     direction="alternate"
                     repeat="indefinite"></a-animation>
      </a-box>

      <!-- Outline frame for full-torso coverage -->
      <a-box id="torso-outline"
             width="0.72"
             height="0.92"
             depth="0.2"
             color="#00ff88"
             opacity="0.6"
             material="wireframe: true; transparent: true">
        <a-animation attribute="scale"
                     from="1 1 1"
                     to="1.05 1.05 1.05"
                     dur="900"
                     direction="alternate"
                     repeat="indefinite"></a-animation>
      </a-box>
    </a-entity>

    <!-- Probe Position Indicator -->
    <a-entity id="probe-indicator" position="0.15 0.75 -0.7">
      <!-- Probe body -->
      <a-cylinder id="probe-body"
                  radius="0.03"
                  height="0.15"
                  color="#333333"
                  rotation="45 0 0"></a-cylinder>
      
      <!-- Probe head -->
      <a-sphere position="0 -0.08 0.06"
                radius="0.025"
                color="#666666"></a-sphere>
    </a-entity>

    <!-- Direction Arrow (pointing TOWARD patient) -->
    <a-entity id="direction-arrow" position="0 1.2 -0.3" look-at="#patient">
      <!-- Arrow shaft -->
      <a-cylinder id="arrow-shaft"
                  radius="0.02"
                  height="0.4"
                  color="#00aaff"
                  position="0 0 -0.1"
                  rotation="90 0 0"></a-cylinder>
      
      <!-- Arrow head (cone pointing toward patient = negative Z) -->
      <a-cone id="arrow-head"
              radius-bottom="0.06"
              radius-top="0"
              height="0.12"
              color="#00aaff"
              position="0 0 -0.35"
              rotation="90 0 0"></a-cone>
      
      <!-- Glow effect -->
      <a-sphere position="0 0 -0.35"
                radius="0.08"
                color="#00aaff"
                opacity="0.3">
        <a-animation attribute="opacity" 
                     from="0.2" 
                     to="0.5" 
                     dur="600" 
                     direction="alternate" 
                     repeat="indefinite"></a-animation>
      </a-sphere>
    </a-entity>

    <!-- Pseudo Heart Display (changes based on selected view) -->
    <a-entity id="heart-display" position="-0.8 1.2 -1" scale="0.4 0.4 0.4">
      <!-- Heart container with label -->
      <a-text value="USG View" 
              position="0 1.2 0" 
              align="center" 
              color="#00ff88"
              width="3"></a-text>
      
      <!-- Full Heart (default view) -->
      <a-entity id="heart-full" visible="true">
        <!-- Left Atrium -->
        <a-sphere id="left-atrium" 
                  position="0.2 0.3 0" 
                  radius="0.25" 
                  color="#cc3333"
                  opacity="0.8"></a-sphere>
        <!-- Right Atrium -->
        <a-sphere id="right-atrium" 
                  position="-0.2 0.3 0" 
                  radius="0.22" 
                  color="#aa2222"
                  opacity="0.8"></a-sphere>
        <!-- Left Ventricle -->
        <a-sphere id="left-ventricle-full" 
                  position="0.15 -0.15 0" 
                  radius="0.35" 
                  color="#dd4444"
                  opacity="0.8"></a-sphere>
        <!-- Right Ventricle -->
        <a-sphere id="right-ventricle-full" 
                  position="-0.2 -0.1 0" 
                  radius="0.28" 
                  color="#bb3333"
                  opacity="0.8"></a-sphere>
        <!-- Aorta -->
        <a-cylinder position="0.3 0.6 0" 
                    radius="0.08" 
                    height="0.4" 
                    color="#ff6666"
                    rotation="0 0 -15"></a-cylinder>
        <!-- Pulmonary Artery -->
        <a-cylinder position="-0.1 0.55 0.1" 
                    radius="0.06" 
                    height="0.3" 
                    color="#ff5555"
                    rotation="10 0 10"></a-cylinder>
      </a-entity>

      <!-- Left Ventricle Focus View -->
      <a-entity id="heart-lv-focus" visible="false">
        <a-text value="Left Ventricle" 
                position="0 0.8 0" 
                align="center" 
                color="#ffaa00"
                width="2.5"></a-text>
        <!-- Enlarged Left Ventricle -->
        <a-sphere position="0 0 0" 
                  radius="0.6" 
                  color="#dd4444"
                  opacity="0.9">
          <a-animation attribute="scale" 
                       from="1 1 1" 
                       to="1.05 1.05 1.05" 
                       dur="800" 
                       direction="alternate" 
                       repeat="indefinite"></a-animation>
        </a-sphere>
        <!-- Mitral Valve indicator -->
        <a-ring position="0 0.45 0.3" 
                radius-inner="0.1" 
                radius-outer="0.18" 
                color="#ff8888"
                rotation="30 0 0"></a-ring>
        <!-- Wall thickness markers -->
        <a-torus position="0 0 0" 
                 radius="0.55" 
                 radius-tubular="0.03" 
                 color="#ffcccc"
                 opacity="0.5"></a-torus>
      </a-entity>

      <!-- Right Ventricle Focus View -->
      <a-entity id="heart-rv-focus" visible="false">
        <a-text value="Right Ventricle" 
                position="0 0.8 0" 
                align="center" 
                color="#00aaff"
                width="2.5"></a-text>
        <!-- Enlarged Right Ventricle -->
        <a-sphere position="0 0 0" 
                  radius="0.5" 
                  color="#bb3333"
                  opacity="0.9">
          <a-animation attribute="scale" 
                       from="1 1 1" 
                       to="1.05 1.05 1.05" 
                       dur="900" 
                       direction="alternate" 
                       repeat="indefinite"></a-animation>
        </a-sphere>
        <!-- Tricuspid Valve indicator -->
        <a-ring position="0 0.35 0.25" 
                radius-inner="0.08" 
                radius-outer="0.15" 
                color="#8888ff"
                rotation="30 0 0"></a-ring>
        <!-- Pulmonary Valve -->
        <a-ring position="0 0.5 0" 
                radius-inner="0.05" 
                radius-outer="0.1" 
                color="#aaaaff"
                rotation="0 0 0"></a-ring>
      </a-entity>

      <!-- Apical 4-Chamber View -->
      <a-entity id="heart-apical4" visible="false">
        <a-text value="Apical 4-Chamber" 
                position="0 0.9 0" 
                align="center" 
                color="#00ff88"
                width="2.5"></a-text>
        <!-- All 4 chambers visible -->
        <a-sphere position="0.25 0.3 0" radius="0.2" color="#cc3333" opacity="0.85"></a-sphere>
        <a-sphere position="-0.25 0.3 0" radius="0.18" color="#aa4444" opacity="0.85"></a-sphere>
        <a-sphere position="0.2 -0.2 0" radius="0.3" color="#dd4444" opacity="0.85"></a-sphere>
        <a-sphere position="-0.2 -0.15 0" radius="0.25" color="#bb5555" opacity="0.85"></a-sphere>
        <!-- Septum -->
        <a-box position="0 0 0" width="0.05" height="0.7" depth="0.3" color="#ffaaaa" opacity="0.6"></a-box>
      </a-entity>

      <!-- Apical 2-Chamber View -->
      <a-entity id="heart-apical2" visible="false">
        <a-text value="Apical 2-Chamber" 
                position="0 0.9 0" 
                align="center" 
                color="#ffaa00"
                width="2.5"></a-text>
        <!-- LA and LV only -->
        <a-sphere position="0 0.35 0" radius="0.25" color="#cc3333" opacity="0.9"></a-sphere>
        <a-sphere position="0 -0.15 0" radius="0.4" color="#dd4444" opacity="0.9"></a-sphere>
        <!-- Mitral valve line -->
        <a-box position="0 0.1 0.2" width="0.3" height="0.02" depth="0.05" color="#ff8888"></a-box>
      </a-entity>

      <!-- Parasternal Long Axis View -->
      <a-entity id="heart-parasternal" visible="false">
        <a-text value="Parasternal Long Axis" 
                position="0 0.9 0" 
                align="center" 
                color="#aa88ff"
                width="2.5"></a-text>
        <!-- Aortic root prominent -->
        <a-cylinder position="0.4 0.2 0" radius="0.12" height="0.5" color="#ff6666" rotation="0 0 -20"></a-cylinder>
        <!-- LA -->
        <a-sphere position="0 0.3 -0.2" radius="0.2" color="#cc3333" opacity="0.8"></a-sphere>
        <!-- LV elongated -->
        <a-cylinder position="-0.1 -0.2 0" radius="0.25" height="0.5" color="#dd4444" rotation="0 0 10"></a-cylinder>
        <!-- Mitral valve -->
        <a-box position="0 0 0" width="0.25" height="0.03" depth="0.15" color="#ff8888"></a-box>
      </a-entity>

      <!-- Subcostal View -->
      <a-entity id="heart-subcostal" visible="false">
        <a-text value="Subcostal View" 
                position="0 0.9 0" 
                align="center" 
                color="#88ffaa"
                width="2.5"></a-text>
        <!-- Liver representation -->
        <a-box position="0 -0.5 0" width="0.8" height="0.2" depth="0.4" color="#8B4513" opacity="0.5"></a-box>
        <!-- Heart from below angle -->
        <a-sphere position="0.15 0.2 0" radius="0.2" color="#cc3333" opacity="0.8"></a-sphere>
        <a-sphere position="-0.15 0.2 0" radius="0.18" color="#aa4444" opacity="0.8"></a-sphere>
        <a-sphere position="0.1 -0.1 0" radius="0.25" color="#dd4444" opacity="0.8"></a-sphere>
        <a-sphere position="-0.15 -0.05 0" radius="0.22" color="#bb5555" opacity="0.8"></a-sphere>
        <!-- IVC indicator -->
        <a-cylinder position="-0.3 0.1 0" radius="0.06" height="0.4" color="#6666cc" rotation="0 0 20"></a-cylinder>
      </a-entity>
    </a-entity>

    <!-- USG Monitor Screen -->
    <a-entity id="usg-monitor" position="0.9 1.3 -0.8" rotation="0 -30 0">
      <a-box width="0.5" height="0.4" depth="0.05" color="#222222"></a-box>
      <a-plane id="usg-screen"
               position="0 0 0.03"
               width="0.45"
               height="0.35"
               color="#000000">
        <!-- Simulated USG display -->
        <a-text id="usg-label" 
                value="ECHO - Apical 4C" 
                position="0 0.14 0.01" 
                align="center" 
                color="#00ff00"
                width="0.8"></a-text>
        <a-ring position="0 -0.02 0.01"
                radius-inner="0.08"
                radius-outer="0.12"
                color="#00ff00"
                opacity="0.8">
          <a-animation attribute="rotation" 
                       from="0 0 0" 
                       to="0 0 360" 
                       dur="3000" 
                       repeat="indefinite"
                       easing="linear"></a-animation>
        </a-ring>
      </a-plane>
    </a-entity>

    <!-- Floor -->
    <a-plane position="0 0 0" 
             rotation="-90 0 0" 
             width="10" 
             height="10" 
             color="#2a2a4a"></a-plane>

    <!-- Room walls for context -->
    <a-box position="0 1.5 -3" width="6" height="3" depth="0.1" color="#1e3a5f" opacity="0.5"></a-box>
  </a-scene>

  <script>
    // View configurations
    const viewConfigs = {
      apical4: {
        name: 'Apical 4-Chamber',
        heartView: 'heart-apical4',
        arrowPosition: { x: 0.1, y: 1.2, z: -0.3 },
        heartPosition: { x: -0.8, y: 1.2, z: -1 },
        heartScale: { x: 0.45, y: 0.45, z: 0.45 },
        instruction: 'Position at apex, marker toward left shoulder',
        usgLabel: 'ECHO - Apical 4C'
      },
      apical2: {
        name: 'Apical 2-Chamber',
        heartView: 'heart-apical2',
        arrowPosition: { x: 0.1, y: 1.2, z: -0.3 },
        heartPosition: { x: -0.8, y: 1.2, z: -1 },
        heartScale: { x: 0.48, y: 0.48, z: 0.48 },
        instruction: 'Rotate 60° counterclockwise from 4-chamber',
        usgLabel: 'ECHO - Apical 2C'
      },
      parasternal: {
        name: 'Parasternal Long Axis',
        heartView: 'heart-parasternal',
        arrowPosition: { x: -0.15, y: 1.2, z: -0.5 },
        heartPosition: { x: -0.85, y: 1.2, z: -1.05 },
        heartScale: { x: 0.42, y: 0.42, z: 0.42 },
        instruction: 'Left sternal border, 3rd-4th intercostal space',
        usgLabel: 'ECHO - PLAX'
      },
      subcostal: {
        name: 'Subcostal',
        heartView: 'heart-subcostal',
        arrowPosition: { x: 0, y: 1.0, z: -0.2 },
        heartPosition: { x: -0.75, y: 1.15, z: -1 },
        heartScale: { x: 0.4, y: 0.4, z: 0.4 },
        instruction: 'Below xiphoid, probe nearly flat, aim toward left shoulder',
        usgLabel: 'ECHO - Subcostal'
      },
      leftVentricle: {
        name: 'Left Ventricle Focus',
        heartView: 'heart-lv-focus',
        arrowPosition: { x: 0.12, y: 1.2, z: -0.35 },
        heartPosition: { x: -0.8, y: 1.2, z: -0.9 },
        heartScale: { x: 0.6, y: 0.6, z: 0.6 },
        instruction: 'Apical position, optimize for LV walls and cavity',
        usgLabel: 'ECHO - LV Focus'
      },
      rightVentricle: {
        name: 'Right Ventricle Focus',
        heartView: 'heart-rv-focus',
        arrowPosition: { x: -0.1, y: 1.2, z: -0.35 },
        heartPosition: { x: -0.8, y: 1.2, z: -0.9 },
        heartScale: { x: 0.58, y: 0.58, z: 0.58 },
        instruction: 'Modified apical, rotate to focus on RV',
        usgLabel: 'ECHO - RV Focus'
      }
    };

    let currentView = 'apical4';

    function selectView(viewId) {
      const config = viewConfigs[viewId];
      if (!config) return;

      currentView = viewId;

      // Update button states
      document.querySelectorAll('#ui-panel button').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById(`btn-${viewId}`).classList.add('active');

      // Update view name display
      document.getElementById('view-name').textContent = config.name;

      // Update instruction text
      document.getElementById('instruction-text').textContent = config.instruction;

      // Hide all heart views, show selected one
      const heartViews = ['heart-full', 'heart-lv-focus', 'heart-rv-focus', 
                          'heart-apical4', 'heart-apical2', 'heart-parasternal', 'heart-subcostal'];
      heartViews.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.setAttribute('visible', false);
      });
      
      const selectedHeart = document.getElementById(config.heartView);
      if (selectedHeart) selectedHeart.setAttribute('visible', true);

      // Update arrow position (orientation is handled by look-at)
      const arrow = document.getElementById('direction-arrow');
      arrow.setAttribute('position', config.arrowPosition);

      // Update heart display position and scale for zoomed views
      const heartDisplay = document.getElementById('heart-display');
      heartDisplay.setAttribute('position', config.heartPosition);
      heartDisplay.setAttribute('scale', config.heartScale);

      // Update USG monitor label
      document.getElementById('usg-label').setAttribute('value', config.usgLabel);
    }

    // Initialize with default view
    document.addEventListener('DOMContentLoaded', () => {
      selectView('apical4');
    });
  </script>
</body>
</html>
