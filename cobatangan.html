<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR USG Training - Hand Detection Integrated</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <!-- Library MediaPipe untuk deteksi tangan -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    #ui-panel {
      position: fixed; top: 20px; left: 20px; z-index: 9999;
      background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 10px;
      color: white; font-family: Arial, sans-serif; width: 250px;
    }
    #ui-panel h3 { margin-top: 0; color: #00ff88; }
    #ui-panel button {
      display: block; width: 100%; padding: 10px; margin: 5px 0;
      background: #1a1a2e; color: white; border: 2px solid #00ff88;
      border-radius: 5px; cursor: pointer; font-size: 13px; transition: all 0.3s;
    }
    #ui-panel button:hover, #ui-panel button.active { background: #00ff88; color: #1a1a2e; }
    
    #probe-instruction {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      background: rgba(0, 100, 200, 0.9); padding: 15px; border-radius: 10px;
      color: white; font-family: Arial, sans-serif; max-width: 220px;
    }

    /* Preview Kamera */
    #camera-preview {
      position: fixed; bottom: 20px; right: 20px;
      width: 240px; height: 180px; z-index: 9999;
      border: 2px solid #00ff88; border-radius: 10px;
      transform: scaleX(-1);
    }
    #status-ai {
      position: fixed; bottom: 210px; right: 20px;
      background: rgba(0,0,0,0.7); color: #00ff88;
      padding: 5px 10px; border-radius: 5px; z-index: 9999; font-family: monospace;
    }
  </style>
</head>
<body>

  <video id="input-video" style="display:none"></video>
  <video id="camera-preview" autoplay playsinline></video>
  <div id="status-ai">Mencari Tangan...</div>

  <div id="ui-panel">
    <h3>🫀 USG Selection</h3>
    <button onclick="selectView('apical4')" id="btn-apical4">Apical 4-Chamber</button>
    <button onclick="selectView('apical2')" id="btn-apical2">Apical 2-Chamber</button>
    <button onclick="selectView('parasternal')" id="btn-parasternal">Parasternal Long Axis</button>
    <button onclick="selectView('subcostal')" id="btn-subcostal">Subcostal</button>
    <div id="current-view" style="margin-top:10px; font-size:12px; text-align:center; background:#16213e; padding:5px;">
      <strong>Current:</strong> <span id="view-name">Apical 4-Chamber</span>
    </div>
  </div>

  <div id="probe-instruction">
    <strong>INSTRUCTION:</strong>
    <p id="instruction-text" style="font-size:13px;">Position at apex, marker toward left shoulder</p>
  </div>

  <a-scene background="color: #1a1a2e">
    <a-entity id="rig" position="0 1.6 2">
      <a-camera look-controls="enabled: true" wasd-controls="enabled: true">
        <a-cursor color="#00ff88"></a-cursor>
      </a-camera>
    </a-entity>

    <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

    <!-- Patient -->
    <a-entity id="patient" position="0 0.5 -1" rotation="-90 0 0">
      <a-box width="0.6" height="0.8" depth="0.25" color="#e8beac" opacity="0.9"></a-box>
      <a-sphere position="0 0.55 0.05" radius="0.15" color="#e8beac"></a-sphere>
    </a-entity>

    <!-- Target Zone -->
    <a-entity id="target-zone" position="0 0.63 -1">
      <a-box width="0.7" height="0.9" depth="0.18" color="#00ff88" opacity="0.2" material="transparent: true"></a-box>
    </a-entity>

    <!-- PROBE (Following Hand Detection) -->
    <a-entity id="hand-probe">
      <a-cylinder radius="0.03" height="0.15" color="#333333" rotation="90 0 0"></a-cylinder>
      <a-sphere position="0 0 -0.08" radius="0.03" color="#666666"></a-sphere>
    </a-entity>

    <!-- Direction Arrow -->
    <a-entity id="direction-arrow" position="0 1.2 -0.3">
      <a-cylinder radius="0.02" height="0.4" color="#00aaff" rotation="90 0 0" position="0 0 -0.1"></a-cylinder>
      <a-cone radius-bottom="0.06" height="0.12" color="#00aaff" rotation="90 0 0" position="0 0 -0.35"></a-cone>
    </a-entity>

    <!-- Heart Display Area -->
    <a-entity id="heart-display" position="-0.8 1.2 -1" scale="0.4 0.4 0.4">
      <a-text value="USG View" position="0 1.2 0" align="center" color="#00ff88" width="3"></a-text>
      
      <!-- Apical 4-Chamber (Default) -->
      <a-entity id="heart-apical4" visible="true">
        <a-sphere position="0.25 0.3 0" radius="0.2" color="#cc3333"></a-sphere>
        <a-sphere position="-0.25 0.3 0" radius="0.18" color="#aa4444"></a-sphere>
        <a-sphere position="0.2 -0.2 0" radius="0.3" color="#dd4444"></a-sphere>
        <a-sphere position="-0.2 -0.15 0" radius="0.25" color="#bb5555"></a-sphere>
        <a-box position="0 0 0" width="0.05" height="0.7" depth="0.3" color="#ffaaaa" opacity="0.6"></a-box>
      </a-entity>

      <!-- Apical 2-Chamber -->
      <a-entity id="heart-apical2" visible="false">
        <a-sphere position="0 0.35 0" radius="0.25" color="#cc3333"></a-sphere>
        <a-sphere position="0 -0.15 0" radius="0.4" color="#dd4444"></a-sphere>
      </a-entity>

      <!-- Parasternal -->
      <a-entity id="heart-parasternal" visible="false">
        <a-cylinder position="0.4 0.2 0" radius="0.12" height="0.5" color="#ff6666" rotation="0 0 -20"></a-cylinder>
        <a-sphere position="0 0.3 -0.2" radius="0.2" color="#cc3333"></a-sphere>
        <a-cylinder position="-0.1 -0.2 0" radius="0.25" height="0.5" color="#dd4444" rotation="0 0 10"></a-cylinder>
      </a-entity>

      <!-- Subcostal -->
      <a-entity id="heart-subcostal" visible="false">
        <a-box position="0 -0.5 0" width="0.8" height="0.2" depth="0.4" color="#8B4513" opacity="0.5"></a-box>
        <a-sphere position="0.15 0.2 0" radius="0.2" color="#cc3333"></a-sphere>
        <a-sphere position="0.1 -0.1 0" radius="0.25" color="#dd4444"></a-sphere>
      </a-entity>
    </a-entity>

    <!-- Monitor -->
    <a-entity id="usg-monitor" position="0.9 1.3 -0.8" rotation="0 -30 0">
      <a-box width="0.5" height="0.4" depth="0.05" color="#222222"></a-box>
      <a-plane position="0 0 0.03" width="0.45" height="0.35" color="#000000">
        <a-text id="usg-label" value="ECHO - Apical 4C" position="0 0.14 0.01" align="center" color="#00ff00" width="0.8"></a-text>
      </a-plane>
    </a-entity>

    <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#2a2a4a"></a-plane>
  </a-scene>

  <script>
    const videoElement = document.getElementById('input-video');
    const previewElement = document.getElementById('camera-preview');
    const statusText = document.getElementById('status-ai');
    const probe = document.getElementById('hand-probe');

    // 1. MEDIAPIPE HANDS SETUP
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        statusText.innerText = "Tangan Terdeteksi";
        const hand = results.multiHandLandmarks[0];
        
        // Landmark 9 (Palm center) mapping to A-Frame
        const x = (0.5 - hand[9].x) * 3; 
        const y = (0.5 - hand[9].y) * 2 + 1.2;
        const z = (hand[9].z * 3) - 0.5;

        probe.setAttribute('position', {x: x, y: y, z: z});

        // Rotasi sederhana berdasarkan pergelangan tangan (landmark 0) dan tengah (landmark 9)
        const dx = hand[9].x - hand[0].x;
        const dy = hand[9].y - hand[0].y;
        const angle = Math.atan2(dy, dx) * (180 / Math.PI);
        probe.setAttribute('rotation', `0 0 ${angle + 90}`);

      } else {
        statusText.innerText = "Mencari Tangan...";
      }
    });

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 640, height: 480
    });

    navigator.mediaDevices.getUserMedia({video: true}).then(stream => {
        videoElement.srcObject = stream;
        previewElement.srcObject = stream;
        camera.start();
    });

    // 2. VIEW CONFIGURATION LOGIC
    const viewConfigs = {
      apical4: { name: 'Apical 4-Chamber', heartView: 'heart-apical4', instr: 'Position at apex, marker toward left shoulder', label: 'ECHO - Apical 4C' },
      apical2: { name: 'Apical 2-Chamber', heartView: 'heart-apical2', instr: 'Rotate 60° counterclockwise from 4-chamber', label: 'ECHO - Apical 2C' },
      parasternal: { name: 'Parasternal Long Axis', heartView: 'heart-parasternal', instr: 'Left sternal border, 3rd-4th intercostal space', label: 'ECHO - PLAX' },
      subcostal: { name: 'Subcostal', heartView: 'heart-subcostal', instr: 'Below xiphoid, probe flat, aim to shoulder', label: 'ECHO - Subcostal' }
    };

    function selectView(viewId) {
      const config = viewConfigs[viewId];
      if (!config) return;

      document.querySelectorAll('#ui-panel button').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`btn-${viewId}`).classList.add('active');
      document.getElementById('view-name').textContent = config.name;
      document.getElementById('instruction-text').textContent = config.instr;
      document.getElementById('usg-label').setAttribute('value', config.label);

      // Hide all heart views
      ['heart-apical4', 'heart-apical2', 'heart-parasternal', 'heart-subcostal'].forEach(id => {
        document.getElementById(id).setAttribute('visible', false);
      });
      document.getElementById(config.heartView).setAttribute('visible', true);
    }
  </script>
</body>
</html>
